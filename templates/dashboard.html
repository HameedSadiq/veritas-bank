{% extends "base.html" %}

{% block title %}Dashboard - Veritas Bank{% endblock %}

{% block content %}
<div class="dashboard-container fade-in">
    <div class="dashboard-header">
        <h1><i class="fas fa-chart-pie"></i> My Dashboard</h1>
        <p>Welcome back! Manage your accounts and finances</p>
    </div>

    <!-- Quick Stats -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">
                <i class="fas fa-wallet"></i>
            </div>
            <div class="stat-content">
                <h3>Total Balance</h3>
                <p class="stat-value" id="totalBalance">KSh 0.00</p>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon">
                <i class="fas fa-layer-group"></i>
            </div>
            <div class="stat-content">
                <h3>Total Accounts</h3>
                <p class="stat-value" id="totalAccounts">0</p>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon">
                <i class="fas fa-exchange-alt"></i>
            </div>
            <div class="stat-content">
                <h3>Recent Transactions</h3>
                <p class="stat-value" id="recentTrans">0</p>
            </div>
        </div>
    </div>

    <!-- Action Buttons -->
    <div class="action-buttons">
        <a href="{{ url_for('accounts.deposit') }}" class="btn btn-success">
            <i class="fas fa-plus-circle"></i> Deposit
        </a>
        <a href="{{ url_for('accounts.withdraw') }}" class="btn btn-danger">
            <i class="fas fa-minus-circle"></i> Withdraw
        </a>
        <a href="{{ url_for('transfers.transfer_page') }}" class="btn btn-info">
            <i class="fas fa-exchange-alt"></i> Transfer
        </a>
    </div>

    <!-- Accounts Section -->
    <div class="card">
        <div class="card-header">
            <h2><i class="fas fa-bank"></i> My Accounts</h2>
        </div>
        <div class="card-body">
            <div id="accountsList" class="accounts-container"></div>
        </div>
    </div>
</div>

<script>
    async function loadDashboard() {
        try {
            const response = await fetch('{{ url_for("accounts.list_accounts") }}');
            const data = await response.json();
            
            if (data.status === 'success') {
                let totalBalance = 0;
                let html = '';
                
                data.accounts.forEach(account => {
                    totalBalance += account.balance;
                    html += `
                        <div class="account-card">
                            <div class="account-info">
                                <h3>${account.type}</h3>
                                <p class="account-number">${account.number}</p>
                            </div>
                            <div class="account-balance">
                                <p class="balance">KSh ${account.balance.toFixed(2)}</p>
                                <p class="status">${account.status}</p>
                            </div>
                        </div>
                    `;
                });
                
                document.getElementById('totalBalance').textContent = `KSh ${totalBalance.toFixed(2)}`;
                document.getElementById('totalAccounts').textContent = data.count;
                document.getElementById('accountsList').innerHTML = html || '<p>No accounts found</p>';
            }
        } catch (error) {
            console.error('Error loading dashboard:', error);
        }
    }
    
    loadDashboard();
</script>
{% endblock %}
