{% extends "base.html" %}

{% block title %}Register - Veritas Bank{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card fade-in" style="max-width: 500px;">
        <div class="auth-header">
            <i class="fas fa-user-plus"></i>
            <h1>Create Account</h1>
            <p>Join Veritas Bank Today</p>
        </div>

        <form id="registerForm" class="auth-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="first_name">
                        <i class="fas fa-user"></i> First Name
                    </label>
                    <input 
                        type="text" 
                        id="first_name" 
                        name="first_name" 
                        required
                        class="form-control"
                    >
                </div>
                <div class="form-group">
                    <label for="last_name">
                        <i class="fas fa-user"></i> Last Name
                    </label>
                    <input 
                        type="text" 
                        id="last_name" 
                        name="last_name" 
                        required
                        class="form-control"
                    >
                </div>
            </div>

            <div class="form-group">
                <label for="email">
                    <i class="fas fa-envelope"></i> Email Address
                </label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required
                    class="form-control"
                >
            </div>

            <div class="form-group">
                <label for="phone">
                    <i class="fas fa-phone"></i> Phone Number
                </label>
                <input 
                    type="tel" 
                    id="phone" 
                    name="phone" 
                    required
                    class="form-control"
                >
            </div>

            <div class="form-group">
                <label for="id_number">
                    <i class="fas fa-id-card"></i> ID Number
                </label>
                <input 
                    type="text" 
                    id="id_number" 
                    name="id_number" 
                    required
                    class="form-control"
                >
            </div>

            <div class="form-group">
                <label for="date_of_birth">
                    <i class="fas fa-calendar"></i> Date of Birth
                </label>
                <input 
                    type="date" 
                    id="date_of_birth" 
                    name="date_of_birth" 
                    required
                    class="form-control"
                >
            </div>

            <div class="form-group">
                <label for="address">
                    <i class="fas fa-map-marker-alt"></i> Address
                </label>
                <textarea 
                    id="address" 
                    name="address" 
                    required
                    class="form-control"
                    rows="3"
                ></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-user-plus"></i> Register
            </button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}" class="link">Login here</a></p>
        </div>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData);
        
        try {
            const response = await fetch('{{ url_for("auth.register") }}', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            
            if (result.status === 'success') {
                showNotification('Registration successful! Please login.', 'success');
                setTimeout(() => window.location.href = '{{ url_for("auth.login") }}', 1500);
            } else {
                showNotification(result.message, 'error');
            }
        } catch (error) {
            showNotification('Registration failed: ' + error.message, 'error');
        }
    });
</script>
{% endblock %}
